apiVersion: otn.rca.dev/v1alpha1
kind: AdapterPromotion
metadata:
  name: promote-qwen7b-grpo-run42
  namespace: training
spec:
  adapterURI: s3://adapters/qwen7b-grpo/run42/
  endpoint: rca-7b                 # KServe InferenceService on the serving cluster
  servingCluster: serving         # key into the cross-cluster kubeconfig Secret
  evalDataset: s3://datasets/eval/holdout.jsonl
  gate:
    eventAcc: 0.70
    boardF1: 0.60
    e2eScore: 0.65
  canaryPercent: 10
  autoPromote: true
