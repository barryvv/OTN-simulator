# DatasetBuild CRD — fills the Kubeflow gap for CPU simulator fan-out +
# content-hash dataset versioning. Reconciled by the DatasetBuild controller
# (deploy/controllers), which fans out N simulate Jobs then runs the matching
# generate_*_data.py and writes a versioned dataset to MinIO.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: datasetbuilds.otn.rca.dev
spec:
  group: otn.rca.dev
  scope: Namespaced
  names:
    kind: DatasetBuild
    plural: datasetbuilds
    singular: datasetbuild
    shortNames: ["dsb"]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: ["spec"]
          properties:
            spec:
              type: object
              required: ["type", "numFailures"]
              properties:
                type:
                  type: string
                  enum: ["sft", "grpo", "sfc_bfl"]
                  description: Which generate_*_data.py to run after simulation.
                numFailures:
                  type: integer
                  minimum: 1
                  description: Number of seeds → parallel simulate Jobs.
                topology:
                  type: object
                  properties:
                    numRoadms: {type: integer, default: 8}
                    eg: {type: integer, default: 5}
                    regenHops: {type: integer, default: 2}
                simulatorOverrides:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  description: Keys merged over simulator.yaml.
                parallelism:
                  type: integer
                  default: 16
                  description: Max concurrent simulate Jobs.
                outputBucket:
                  type: string
                  default: "s3://datasets"
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: ["Pending", "Simulating", "Generating", "Ready", "Failed"]
                datasetURI: {type: string}
                contentHash: {type: string}
                stats:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                completedSimulations: {type: integer}
                message: {type: string}
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Dataset
          type: string
          jsonPath: .status.datasetURI
      subresources:
        status: {}
